<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dieter Rams Minimal Homepage</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Helvetica, Arial, sans-serif;
      background-color: #fff;
      color: #000;
      line-height: 1.6;
    }
    header {
      padding: 1rem 2rem;
      font-size: 0.9rem;
      font-weight: bold;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10vh 2rem;
    }
    main h1 {
      font-size: 1.8rem;
      font-weight: normal;
      margin-bottom: 2rem;
      max-width: 600px;
    }
    footer {
      font-size: 0.8rem;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #ddd;
      color: #444;
    }
    footer a {
      margin: 0 0.5rem;
      color: #444;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    SocialsEasy
  </header>

  <main>
    <h1>“We craft messages that connect.”</h1>
  </main>

  <footer>
    <a href="#about">About</a> |
    <a href="#contact">Contact</a><br>
    © 2025
  </footer>
</body>
</html>
