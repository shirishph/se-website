<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SocialsEasy — Minimal Homepage</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --fg: #111;
      --muted: #616161;
      --rule: #111;
      --accent: #4b5dff;
      --darkgrey: #222; /* very dark grey for hero word */
      --b: 8px;
      --s1: calc(var(--b) * 1);
      --s2: calc(var(--b) * 2);
      --s3: calc(var(--b) * 3);
      --s4: calc(var(--b) * 4);
      --s6: calc(var(--b) * 6);
      --s8: calc(var(--b) * 8);
      --container: 1200px;
    }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: Helvetica, Arial, sans-serif; line-height: 1.45;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    .wrap { max-width: var(--container); margin: 0 auto; padding: var(--s3) var(--s3) 0; }

    /* Header: brand only */
    header {
      display: flex;
      align-items: center;
      font-size: 0.9rem; letter-spacing: 0.02em;
      margin-bottom: clamp(var(--s6), 10vh, var(--s8));
    }
    .brand { font-weight: 600; }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Hero */
    .hero { display: block; padding-left: var(--s1); padding-right: var(--s1); }
    .kicker { font-size: clamp(0.9rem, 0.4vw + 0.8rem, 1rem); color: var(--muted); margin: 0 0 var(--s2) 0; }
    .word { font-weight: 700; letter-spacing: -0.02em; font-size: clamp(4rem, 14vw, 9rem); line-height: 0.9; margin: 0 0 var(--s2) 0; display: inline-block; padding-bottom: var(--s1); border-bottom: 1px solid var(--rule); color: var(--darkgrey); }
    .support { margin-top: var(--s2); max-width: 60ch; color: var(--muted); font-size: clamp(0.95rem, 0.5vw + 0.75rem, 1.05rem); }

    /* Footer */
    footer { margin: clamp(var(--s6), 12vh, var(--s8)) 0 var(--s6); display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 0.9rem; border-top: 1px solid rgba(0,0,0,0.08); padding-top: var(--s2); }

    @media (max-width: 720px) {
      .wrap { padding: var(--s2); }
      header { margin-bottom: var(--s6); }
      footer { flex-direction: column; gap: var(--s2); align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header aria-label="Primary">
      <div class="brand">SocialsEasy</div>
    </header>

    <section class="hero" aria-labelledby="hero-title">
      <p class="kicker">Daily marketing messages for restaurants and agencies.</p>
      <h1 id="hero-title" class="word">connect</h1>
      <p class="support">Fresh marketing copy, post ideas, and social messages generated every day.</p>
    </section>

    <footer>
      <div>© 2025 SocialsEasy</div>
      <nav aria-label="Footer">
        <a href="#about">About</a>
        <span style="margin: 0 var(--s2);">·</span>
        <a href="#contact">Contact</a>
      </nav>
    </footer>
  </div>
</body>
</html>
